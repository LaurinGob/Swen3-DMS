name: .NET CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: myuser
          RABBITMQ_DEFAULT_PASS: mypassword

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore Swen3-DMS.sln

      - name: Build
        run: dotnet build Swen3-DMS.sln --configuration Release --no-restore

      - name: Code formatting check
        run: dotnet format Swen3-DMS.sln --verify-no-changes --verbosity diagnostic

      - name: Test
        run: dotnet test Swen3-DMS.sln --no-build --verbosity normal
